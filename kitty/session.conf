# ================================================
# WAYTILES — Dragon Layout Session
# ================================================
# Starts Kitty with the Dragon tiling layout:
# one large terminal left, two stacked right.
#
# Usage: kitty --session ~/.config/kitty/session.conf
# ================================================

new_tab Dragon
layout splits

launch --location=first
launch --location=vsplit --cwd=current
launch --location=hsplit --cwd=current
