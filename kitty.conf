# ================================================
# WAYTILES — Kitty Terminal Config
# ================================================
# To switch theme, change the include line below.
# Available themes: dragon, catppuccin, gruvbox
# ================================================

# === THEME — change this one line to switch ===
include ../themes/dragon.conf
# include ../themes/catppuccin.conf
# include ../themes/gruvbox.conf

# --- Font ---
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        13.0

# Fallback if Nerd Font is missing:
# font_family    monospace

# --- Window ---
window_padding_width    8
hide_window_decorations no
confirm_os_window_close 0

# --- Scrollback ---
scrollback_lines 10000

# --- Bell ---
enable_audio_bell    no
visual_bell_duration 0.1

# --- Tiling layouts ---
enabled_layouts splits, stack

# --- Tiling keybinds ---
map ctrl+alt+v   launch --location=vsplit --cwd=current
map ctrl+alt+h   launch --location=hsplit --cwd=current
map ctrl+alt+r   layout_action resize_to_divide 2

# --- Tab bar ---
tab_bar_style       powerline
tab_powerline_style slanted
